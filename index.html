<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Andrew's Ultimate Website</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);color:#fff;overflow-x:hidden}
header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
h1{font-size:clamp(3rem,8vw,6rem);background:linear-gradient(90deg,#fff,#38bdf8,#a855f7);-webkit-background-clip:text;color:transparent}
p{max-width:700px;font-size:1.3rem;margin:20px auto;line-height:1.6}
button{padding:15px 30px;border:none;border-radius:999px;background:#38bdf8;color:#001;font-weight:bold;font-size:1rem;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.08)}
section{padding:80px 10%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}
.card{background:rgba(255,255,255,.08);padding:30px;border-radius:20px;backdrop-filter:blur(10px)}
footer{text-align:center;padding:40px;color:#ddd}
</style>
</head>
<body>
<header>
<h1>Andrew's Ultimate Website</h1>
<p>A futuristic personal website built with HTML, CSS and JavaScript.</p>
<button onclick="surprise()">Surprise Me</button>
</header>

<section>
<h2>Projects</h2><br>
<div class="grid">
<div class="card"><h3>🤖 AI</h3><p>Learn about AI and future technology.</p></div>
<div class="card"><h3>🏀 Sports</h3><p>Track basketball stats and highlights.</p></div>
<div class="card"><h3>💻 Coding</h3><p>Build amazing web projects.</p></div>
</div>
</section>

<section>
<h2>Mini Game</h2><br>
<h3 id="score">Score: 0</h3><br>
<button onclick="add()">+1 Point</button>
</section>

<footer>Made by Andrew © 2026</footer>

<script>
let score=0;
function add(){
 score++;
 document.getElementById("score").innerText="Score: "+score;
 if(score===10)alert("🔥 Nice!");
 if(score===25)alert("🚀 Amazing!");
}
function surprise(){
 const a=["🌊 Ocean Mode!","🚀 Future Coder!","🤖 AI Activated!","🏀 Swish!","👑 Legend!"];
 alert(a[Math.floor(Math.random()*a.length)]);
}
</script>
</body>
</html>
